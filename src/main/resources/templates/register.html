<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyForge</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <style>
        .form-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-card {
            max-width: 450px;
            width: 100%;
            background: linear-gradient(135deg, #14141c, #1a1a24);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .form-title {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #8e8ea0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 8px;
        }

        .form-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--success);
            box-shadow: 0 0 0 2px rgba(74, 140, 92, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .form-link {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .form-link a {
            color: var(--success);
            text-decoration: none;
        }

        .form-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            display: none;
        }

        .alert-error {
            background: rgba(196, 78, 78, 0.1);
            border: 1px solid rgba(196, 78, 78, 0.3);
            color: #c44e4e;
        }

        a {
            text-decoration: none;
        }

    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">StudyForge</a>
    <ul class="navbar-nav">
        <li><a href="/login" class="nav-link">Войти</a></li>
        <li><a href="/register" class="nav-link" style="background: linear-gradient(135deg, #fafafa, #e0e0e8); color: #0a0a0f; border-radius: 10px;">Регистрация</a></li>
    </ul>
</nav>
<div class="form-container">
    <div class="form-card fade-in">
        <h1 class="form-title">Создать аккаунт</h1>
        <p class="form-subtitle">Начните управлять своей учебой</p>
        <div id="alert" class="alert alert-error"></div>
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input type="text" id="firstName" class="form-input" placeholder="Иван" required>
            </div>
            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input type="text" id="lastName" class="form-input" placeholder="Иванов" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="text" id="email" class="form-input" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" id="password" class="form-input" placeholder="Минимум 8 символов" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <p class="form-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
